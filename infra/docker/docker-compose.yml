version: '3.9'

services:
  # ─── Databases ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: poker_platform
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?required} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ──────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-poker}:${POSTGRES_PASSWORD}@postgres:5432/poker_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?required}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?required}
      TON_RPC_URL: ${TON_RPC_URL:-https://toncenter.com/api/v2}
      TON_API_KEY: ${TON_API_KEY:?required}
      TON_NETWORK: ${TON_NETWORK:-mainnet}
      PLATFORM_WALLET_ADDRESS: ${PLATFORM_WALLET_ADDRESS:?required}
      PLATFORM_WALLET_MNEMONIC: ${PLATFORM_WALLET_MNEMONIC:?required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://your-mini-app.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  game-server:
    build:
      context: ../..
      dockerfile: services/game-server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      GAME_SERVER_PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-poker}:${POSTGRES_PASSWORD}@postgres:5432/poker_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2  # Scale horizontally — Redis adapter handles cross-instance events
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  wallet-processor:
    build:
      context: ../..
      dockerfile: services/wallet-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-poker}:${POSTGRES_PASSWORD}@postgres:5432/poker_platform
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TON_RPC_URL: ${TON_RPC_URL}
      TON_API_KEY: ${TON_API_KEY}
      PLATFORM_WALLET_ADDRESS: ${PLATFORM_WALLET_ADDRESS}
      PLATFORM_WALLET_MNEMONIC: ${PLATFORM_WALLET_MNEMONIC}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Only ONE instance — wallet operations must be serialized
    deploy:
      replicas: 1

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - game-server

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
